<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: dark engineering blue (matches dark mode --bg) -->
  <rect width="32" height="32" rx="7" fill="#050c12"/>
  <!-- Subtle teal border -->
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="#10a8d0" stroke-width="1.2" opacity="0.6"/>
  <!-- D letter -->
  <text x="8" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="15"
        font-weight="800" fill="#ffffff">D</text>
  <!-- C letter in teal accent -->
  <text x="18" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="15"
        font-weight="800" fill="#10a8d0">C</text>
</svg>
