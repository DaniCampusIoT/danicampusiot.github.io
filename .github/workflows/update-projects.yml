name: Update Portfolio Projects

on:
  # Se ejecuta al hacer push a main
  push:
    branches: [main]
    paths-ignore:
      - 'languages/**'
      - 'projects-override.json'
  # O manualmente desde Actions
  workflow_dispatch:
  # O cada lunes a las 06:00 UTC
  schedule:
    - cron: '0 6 * * 1'

jobs:
  update-projects:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: DaniCampusIoT
        run: python scripts/update_projects.py

      - name: Commit updated language files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add languages/es.json languages/en.json
          git diff --cached --quiet || git commit -m "chore(auto): update portfolio projects [skip ci]"
          git push
